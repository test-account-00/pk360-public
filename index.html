<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Set the full height of the viewport and a fallback color */
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #282c34;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Centered container */
        .centered {
            text-align: center;
            font-size: 40px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 3s ease forwards;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="centered">
        Coming Soon
    </div>
</body>
</html>
